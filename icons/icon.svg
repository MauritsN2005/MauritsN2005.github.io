<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bord achtergrond -->
  <rect width="600" height="600" fill="black"/>

  <!-- Rode en gele bolletjes met glow (iets groter zodat geen zwart zichtbaar) -->
  <g filter="url(#glow)">
    <circle cx="480" cy="120" r="46" fill="#ff3b3b"/>
    <circle cx="360" cy="240" r="46" fill="#ff3b3b"/>
    <circle cx="480" cy="240" r="46" fill="#ffd93b"/>
    <circle cx="240" cy="360" r="46" fill="#ff3b3b"/>
    <circle cx="360" cy="360" r="46" fill="#ffd93b"/>
    <circle cx="480" cy="360" r="46" fill="#ffd93b"/>
    <circle cx="120" cy="480" r="46" fill="#ff3b3b"/>
    <circle cx="240" cy="480" r="46" fill="#ffd93b"/>
    <circle cx="360" cy="480" r="46" fill="#ff3b3b"/>
    <circle cx="480" cy="480" r="46" fill="#ffd93b"/>
  </g>

  <!-- Raster cirkels met blauwe randen (boven de bolletjes) -->
  <g stroke="#35f2e5" stroke-width="6" fill="none">
    <circle cx="120" cy="120" r="48"/>
    <circle cx="240" cy="120" r="48"/>
    <circle cx="360" cy="120" r="48"/>
    <circle cx="480" cy="120" r="48"/>
    <circle cx="120" cy="240" r="48"/>
    <circle cx="240" cy="240" r="48"/>
    <circle cx="360" cy="240" r="48"/>
    <circle cx="480" cy="240" r="48"/>
    <circle cx="120" cy="360" r="48"/>
    <circle cx="240" cy="360" r="48"/>
    <circle cx="360" cy="360" r="48"/>
    <circle cx="480" cy="360" r="48"/>
    <circle cx="120" cy="480" r="48"/>
    <circle cx="240" cy="480" r="48"/>
    <circle cx="360" cy="480" r="48"/>
    <circle cx="480" cy="480" r="48"/>
  </g>
</svg>